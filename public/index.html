<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Login</title>
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(120deg, #f6d365 0%, #fda085 100%);
        font-family: 'Segoe UI', Arial, sans-serif;
        margin: 0;
      }
      .login-container {
        background: #fff;
        padding: 2.5rem 2rem;
        border-radius: 1.2rem;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        width: 100%;
        max-width: 350px;
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
      }
      .login-container h2 {
        margin: 0 0 0.5rem 0;
        font-weight: 600;
        color: #333;
        text-align: center;
      }
      .login-container label {
        font-size: 0.98rem;
        color: #555;
        margin-bottom: 0.2rem;
      }
      .login-container input[type='text'],
      .login-container input[type='password'] {
        padding: 0.7rem 0.9rem;
        border: 1px solid #ddd;
        border-radius: 0.5rem;
        font-size: 1rem;
        background: #fafafa;
        transition: border 0.2s;
      }
      .login-container input:focus {
        border-color: #fda085;
        outline: none;
      }
      .login-container button {
        padding: 0.8rem 0;
        background: linear-gradient(90deg, #f6d365 0%, #fda085 100%);
        color: #fff;
        border: none;
        border-radius: 0.5rem;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 0.5rem;
      }
      .login-container button:hover {
        background: linear-gradient(90deg, #fda085 0%, #f6d365 100%);
      }
      .login-container .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
      }
      .authenticated-message {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 200px;
        font-size: 2rem;
        font-weight: bold;
      }
      .login-error {
        color: #d32f2f;
        background: #ffeaea;
        border-radius: 0.4rem;
        padding: 0.5rem 1rem;
        margin-top: -0.5rem;
        text-align: center;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <form class="login-container" autocomplete="off">
      <h2>Sign In</h2>
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          required
          autofocus
        />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          required
        />
      </div>
      <button type="submit">Login</button>
    </form>
    <script>
      const form = document.querySelector('.login-container')
      const usernameInput = document.getElementById('username')
      const passwordInput = document.getElementById('password')
      let errorElem = null

      form.addEventListener('submit', function (e) {
        e.preventDefault()
        const username = usernameInput.value.trim()
        const password = passwordInput.value

        // Remove previous error if any
        if (errorElem) {
          errorElem.remove()
          errorElem = null
        }

        if (username === 'cypress' && password === 'rocks') {
          // Authenticated: replace form with Authenticated message
          form.remove()
          const authDiv = document.createElement('div')
          authDiv.className = 'authenticated-message'
          authDiv.textContent = 'Authenticated'
          document.body.appendChild(authDiv)
        } else {
          // Show error, clear inputs
          errorElem = document.createElement('div')
          errorElem.textContent = 'wrong username or password'
          errorElem.className = 'login-error'
          form.insertBefore(errorElem, form.firstChild.nextSibling)
          usernameInput.value = ''
          passwordInput.value = ''
          usernameInput.focus()
        }
      })
    </script>
  </body>
</html>
